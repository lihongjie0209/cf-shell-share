name = "cf-shell-share"
main = "src/index.ts"
compatibility_date = "2024-07-25"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "SESSIONS"
class_name = "SessionDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionDO"]

[[routes]]
pattern = "sh.lihongjie.cn/*"
zone_name = "lihongjie.cn"

[[routes]]
pattern = "sh.backend.lihongjie.cn/*"
zone_name = "lihongjie.cn"

[[routes]]
pattern = "sh.cn.lihongjie.cn/*"
zone_name = "lihongjie.cn"
